<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Links</title>
    <style>
        /* Sets up your specific dark gradient background layout */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #d97706 0%, #0f172a 40%, #0f172a 60%, #eab308 100%);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Red heading text style matching your image layout */
        .heading-text {
            color: #ff0000;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        /* Horizontal layout alignment container */
        .social-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 40px; 
        }

        /* Base styles for the clickable links and embedded graphic icons */
        .social-icon svg {
            width: 40px;
            height: 40px;
            fill: #ffffff; /* Sets icon color to clean white */
            transition: transform 0.2s ease, fill 0.2s ease;
        }

        /* Clean interactive hover effects */
        .social-icon:hover svg {
            transform: scale(1.2);
            fill: #f97316; /* Highlights orange on hover to match ambient glow */
            
        }
    </style>
</head>
<body>

    <!-- Heading Text -->
    <div class="heading-text">
        Some References to interact with me via social media
    </div>
